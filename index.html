<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEYV | Premium Cosmetics & Fragrances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="heyv-v4-main.css">
</head>
<body class="transition-colors duration-500">

    <!-- MODERN HEADER -->
    <header class="fixed w-full z-50 glass-header p-5 transition-all">
        <div class="container mx-auto flex justify-between items-center">
            <img src="logo.jpeg" alt="HEYV Logo" class="w-12 h-12 rounded-full object-cover cursor-pointer" onclick="window.scrollTo(0,0)">
            
            <div class="flex items-center gap-4 md:gap-8">
                <!-- LANGUAGE PICKER -->
                <div class="flex gap-2 text-sm md:text-base font-bold tracking-widest" dir="ltr">
                    <button onclick="setLang('en')" id="lang-en" class="opacity-50 hover:opacity-100 transition">EN</button>
                    <span>|</span>
                    <button onclick="setLang('ku')" id="lang-ku" class="opacity-50 hover:opacity-100 transition">KU</button>
                    <span>|</span>
                    <button onclick="setLang('ar')" id="lang-ar" class="opacity-50 hover:opacity-100 transition">AR</button>
                </div>
                
                <!-- DARK/LIGHT MODE TOGGLE -->
                <button onclick="h_toggleMode()" class="text-xl hover:scale-110 transition">
                    <i id="modeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- CINEMATIC HERO -->
    <section id="hero-main" class="h-screen relative flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/50 z-10"></div>
        <video src="video header.mp4" class="absolute inset-0 w-full h-full object-cover pointer-events-none" autoplay loop muted playsinline></video>
        <div class="relative z-20 text-center px-4 text-white" data-aos="zoom-out" data-aos-duration="1500">
            <h2 id="hero-title" class="text-6xl md:text-[10rem] font-bold italic tracking-tighter leading-none mb-4">HEYV</h2>
            <p id="hero-subtitle" class="tracking-[0.4em] text-sm md:text-xl uppercase mb-10">Premium Skincare & Beauty Essentials</p>
            <button id="hero-btn" onclick="document.getElementById('shop-section').scrollIntoView({behavior:'smooth'})" class="border-2 border-white px-12 py-4 uppercase font-bold tracking-widest hover:bg-white hover:text-black transition text-white">Explore Collection</button>
        </div>
    </section>

    <!-- CONTENT AREA -->
    <main id="shop-section" class="container mx-auto py-16 px-4 md:px-8 min-h-screen">
        <div id="shop-list" class="flex flex-col gap-12 md:gap-20 max-w-5xl mx-auto">
            <!-- Products injected by JS -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer-bg pt-24 pb-12 border-t border-gray-800 px-8 mt-20">
        <div class="container mx-auto grid grid-cols-1 md:grid-cols-2 gap-16">
            <div>
                <div class="flex items-center gap-4 mb-6">
                    <img src="logo.jpeg" alt="HEYV Logo" class="w-12 h-12 rounded-full object-cover shadow-lg">
                    <h4 id="footer-store-title" class="text-2xl font-black uppercase m-0">HEYV STORE</h4>
                </div>
                <p id="footer-store-desc" class="opacity-60 mb-6">Premium skincare and luxury fragrances carefully curated for you.</p>
                <div class="flex gap-6 text-2xl">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div>
                <h4 id="footer-support" class="font-bold mb-6 uppercase tracking-widest">Support</h4>
                <p>Zakho, Iraq</p>
                <p class="text-xl font-bold mt-2" dir="ltr" style="text-align: inherit;">+964 750 201 5912</p>
                <p id="footer-pay" class="mt-4 opacity-60 italic">Pay on Delivery Available</p>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="heyv-v4-logic.js"></script>
</body>
</html>
